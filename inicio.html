<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início - Sistema Judiciário</title>
</head>
<body>
    <header class="topo">
        <h1>SISTEMA JUDICIÁRIO DO BRASIL</h1>
    </header>
    <main class="container-centro">
        <div class="inicio-card">
            <h1>BEM VINDO!</h1>
            <div class="botoes-container">
                <a href="registro.html" class="btn">Registro</a>
                <a href="login.html" class="btn">Login</a>
            </div>
        </div>
    </main>
        <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #f4f6f9;
        }
        .topo {
            color: white;
            text-align: center;
            padding: 20px;
            background-color: #2f383f;
            margin: 10px;
            border-radius: 12px;
        }
        .container-centro {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .inicio-card {
            color: white;
            background-color: rgb(82, 105, 121);
            padding: 50px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .botoes-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }
        .btn {
            color: black;
            text-decoration: none;
            background-color: rgb(132, 146, 156);
            font-size: 18px;
            padding: 12px 25px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #a4b2bc;
        }
    </style>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Judiciário</title>
</head>
<body>
    <form action="erros.html">
        <h1>Login</h1>
        <label for="fname">Nome:</label>
        <input type="text">
            
        <label for="password">Senha:</label>
        <input type="password">
        
        <label for="femail">Email:</label>
        <input type="email">
        
        <button type="submit" class="botao1">Enviar</button>
    </form>
        <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        form {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 300px;
        }

        h1 { 
            color: #2f383f; 
            text-align: center; 
        }

        label { 
            display: block; 
            margin-top: 15px; 
            color: #555; 
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .botao1 {
            display: block;
            width: 100%;
            background-color: rgb(69, 67, 72);
            color: white;
            padding: 12px;
            text-align: center;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            border: none;
            cursor: pointer;
        }
    </style>
</body>
</html>
